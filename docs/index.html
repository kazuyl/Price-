<!DOCTYPE html>
<html>
<head>
  <title>Bot Dashboard</title>
</head>
<body style="background:#0b1020; color:white; font-family:sans-serif">

<h1>Trading Bot Dashboard</h1>

<div>
  <p>Closed Trades: <span id="closed_trades">-</span></p>
  <p>Winrate: <span id="winrate">-</span></p>
  <p>Average R: <span id="avg_r">-</span></p>
  <p>Realized R: <span id="realized_r">-</span></p>
  <p><b>Current Price: <span id="current_price">-</span></b></p>
</div>

<script>
function fmt(v, d=2){
  if(v==null) return '-'
  return Number(v).toFixed(d)
}

function text(id,val){
  document.getElementById(id).innerText = val
}

async function loadData(){
  const res = await fetch("https://bot-v2-production.up.railway.app/dashboard_data")
  const data = await res.json()

  const m = data.metrics

  text("closed_trades", m.closed_trades)
  text("winrate", fmt(m.winrate))
  text("avg_r", fmt(m.avg_r))
  text("realized_r", fmt(m.realized_r))

  // 🔥 DAS IST DER WICHTIGE PART
  text("current_price", fmt(data.current_price))
}

setInterval(loadData, 2000)
loadData()
</script>

</body>
</html>
